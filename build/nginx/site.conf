#   TODO: configurar apropriadamente
server {
	listen [::]:80 default_server;
	listen 80 default_server;
    server_name  _;
    root /var/www/project-name/public;

    charset utf-8;

    # Log access to this file
    # Default: logs/access.log combined
    # https://nginx.org/en/docs/http/ngx_http_log_module.html#access_log
    access_log  /var/log/nginx/access.log  main;

    # How long to allow each connection to stay idle.
    # Longer values are better for each individual client, particularly for SSL,
    # but means that worker connections are tied up longer.
    # Default: 75s
    # https://nginx.org/en/docs/http/ngx_http_core_module.html#keepalive_timeout
    keepalive_timeout 20s;

    # TODO: configurar de acordo com o projeto
    error_page 400 401 403 404 405 408 409 410 411 412 413 414 415 416 417 418 421 422 423 424 426 428 429 431 451 500 501 502 503 504 505 506 507 508 510 511 /index.php?http-error-code=$status;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt { access_log off; log_not_found off; }
    
    location / {
        root /var/www/project-name/public;
        fastcgi_pass   php-fpm_server:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME  $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        #fastcgi_intercept_errors on;
    }

    location /resources {
        root /var/www/project-name;
        access_log off;
        # TODO: definir cache do navegador nos headers de responsta
        # TODO: negar todos e permitir somente local
    }
}
