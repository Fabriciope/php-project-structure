#   TODO: configurar apropriadamente
server {
	listen 80 default_server;
	listen [::]:80 default_server;
    server_name  127.0.0.1;
    root /var/www/project-name;

    charset utf-8;

    access_log  /var/www/project-name/logs/nginx/access.log  main;

    # TODO: configurar de acordo com o projeto
    # redirect server error pages to the static page /50x.html
    #error_page  404              /404.html;
    #error_page   500 502 503 504  /50x.html;
    #location = /50x.html {
    #   root   /usr/share/nginx/html;
    #}

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ @php_fpm;
    }
    
    location @php_fpm {
        fastcgi_index  index.php;
        fastcgi_pass   php-fpm:9000;
        fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_intercept_errors on;
    }

    # TODO: configure resouces and assets and logs
}
